{{ define "head" -}}
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            secondary: "#5f5f56",
            primary: "#9a4021",
            "on-surface-variant": "#56423c",
            "on-secondary-fixed": "#1c1c15",
            "surface-variant": "#e5e2df",
            "primary-fixed-dim": "#ffb59d",
            outline: "#89726b",
            "surface-dim": "#dcdad6",
            "on-primary-container": "#fffbff",
            "surface-container-low": "#f6f3f0",
            surface: "#fcf9f5",
            "on-primary-fixed-variant": "#7e2c0e",
            "secondary-container": "#e5e3d8",
            "error-container": "#ffdad6",
            "on-tertiary-fixed": "#002020",
            error: "#ba1a1a",
            "secondary-fixed-dim": "#c8c7bc",
            "tertiary-fixed": "#89f4f4",
            "surface-bright": "#fcf9f5",
            "inverse-on-surface": "#f3f0ed",
            "on-surface": "#1c1c1a",
            "primary-container": "#b95837",
            "tertiary-container": "#008283",
            "on-primary-fixed": "#390b00",
            "on-background": "#1c1c1a",
            "surface-container-highest": "#e5e2df",
            "on-tertiary-container": "#f3fffe",
            "on-error": "#ffffff",
            "inverse-surface": "#31302e",
            "surface-container-lowest": "#ffffff",
            "primary-fixed": "#ffdbd0",
            "on-secondary": "#ffffff",
            "on-error-container": "#93000a",
            "on-secondary-container": "#65655c",
            "secondary-fixed": "#e5e3d8",
            "on-secondary-fixed-variant": "#47473f",
            "surface-container-high": "#eae8e4",
            "outline-variant": "#dcc1b8",
            "tertiary-fixed-dim": "#6cd7d8",
            "on-tertiary": "#ffffff",
            "on-primary": "#ffffff",
            "surface-container": "#f0edea",
            tertiary: "#006768",
            "surface-tint": "#9d4324",
            "inverse-primary": "#ffb59d",
            background: "#fcf9f5",
            "on-tertiary-fixed-variant": "#004f50",
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
          spacing: {
            sm: "8px",
            gutter: "24px",
            md: "16px",
            lg: "24px",
            xl: "40px",
            "2xl": "64px",
            xs: "4px",
            unit: "4px",
            "container-max": "1120px",
          },
          fontFamily: {
            h1: ["Manrope"],
            h2: ["Manrope"],
            h3: ["Manrope"],
            label: ["Inter"],
            "body-md": ["Inter"],
            "body-lg": ["Inter"],
            "body-sm": ["Inter"],
          },
          fontSize: {
            h1: ["40px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "600" }],
            h2: ["32px", { lineHeight: "1.3", fontWeight: "600" }],
            h3: ["24px", { lineHeight: "1.4", fontWeight: "500" }],
            label: ["13px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "500" }],
            "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
            "body-lg": ["18px", { lineHeight: "1.7", fontWeight: "400" }],
            "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/static/app.css">
{{- end }}

{{ define "action_button" -}}
  {{ if .IsLink }}
  <a class="app-primary-button app-primary-button--inline" href="{{ .Href }}">
    {{ if .Icon }}<span class="material-symbols-outlined">{{ .Icon }}</span>{{ end }}
    <span>{{ .Label }}</span>
  </a>
  {{ else }}
  <button class="app-primary-button{{ if .Href }} app-primary-button--link{{ else if .ID }} app-primary-button--inline{{ end }}"{{ if .ID }} id="{{ .ID }}"{{ end }} type="button">
    {{ if .Icon }}<span class="material-symbols-outlined">{{ .Icon }}</span>{{ end }}
    <span>{{ .Label }}</span>
  </button>
  {{ end }}
{{- end }}

{{ define "scripts" -}}
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="/static/app.js"></script>
{{- end }}
