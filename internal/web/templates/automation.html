{{ define "page_content" -}}
  <div class="app-content-inner">
    <section class="app-page-stack">
      <div class="app-section-grid app-section-grid--three automation-stats">
        <div class="app-card">
          <div class="flex items-start justify-between mb-8">
            <div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-primary">
              <span class="material-symbols-outlined">check_circle</span>
            </div>
            <span class="automation-stat-badge bg-[#e7f6f7] text-[#168d92]">今日成功率</span>
          </div>
          <div class="flex items-end gap-2">
            <span id="automation-success-rate" class="font-h1 text-h1 text-on-surface leading-none">--</span>
            <span id="automation-success-meta" class="font-body-md text-body-md text-secondary mb-2">/ --</span>
          </div>
        </div>

        <div class="app-card">
          <div class="flex items-start justify-between mb-8">
            <div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-primary">
              <span class="material-symbols-outlined">autorenew</span>
            </div>
            <span class="automation-stat-badge bg-[#fff1ec] text-[#c96442]">运行中任务</span>
          </div>
          <div class="flex items-end gap-2">
            <span id="automation-running-count" class="font-h1 text-h1 text-on-surface leading-none">0</span>
            <span class="font-body-md text-body-md text-secondary mb-2">个活跃流</span>
          </div>
        </div>

        <div class="app-card">
          <div class="flex items-start justify-between mb-8">
            <div class="w-14 h-14 rounded-full bg-error-container flex items-center justify-center text-error">
              <span class="material-symbols-outlined">error</span>
            </div>
            <span class="automation-stat-badge bg-[#ffeceb] text-[#cb3f38]">异常警告</span>
          </div>
          <div class="flex items-end gap-2">
            <span id="automation-failed-count" class="font-h1 text-h1 text-error leading-none">0</span>
            <span class="font-body-md text-body-md text-secondary mb-2">需干预</span>
          </div>
        </div>
      </div>

      <section class="app-card automation-run-card">
        <div class="app-card-head">
          <div>
            <h3 class="app-card-title">近期执行历史 (Runs)</h3>
            <p class="app-card-subtitle">点击任意执行即可跳回对应会话。</p>
          </div>
          <span id="automation-run-total" class="app-count-badge">0</span>
        </div>
        <div id="automation-run-list"></div>
      </section>
    </section>
  </div>
{{- end }}
