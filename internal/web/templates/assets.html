{{ define "page_content" -}}
  <div class="app-content-inner">
    <section class="app-page-stack">
      <div class="app-overview-grid app-overview-grid--three">
        <article class="app-overview-card">
          <span class="app-overview-label">已接入主机</span>
          <strong id="assets-total-hosts" class="app-overview-value">0</strong>
          <p class="app-overview-note">来自 `/api/hosts` 的真实数据。</p>
        </article>
        <article class="app-overview-card">
          <span class="app-overview-label">活跃 Runs</span>
          <strong id="assets-active-runs" class="app-overview-value">0</strong>
          <p class="app-overview-note">当前仍在推进或等待审批的执行。</p>
        </article>
        <article class="app-overview-card">
          <span class="app-overview-label">待审批</span>
          <strong id="assets-pending-approvals" class="app-overview-value app-overview-value--warn">0</strong>
          <p class="app-overview-note">需要人工确认的变更请求。</p>
        </article>
      </div>

      <div class="assets-layout">
        <div class="assets-list" id="assets-host-list"></div>

        <aside class="app-card assets-form-card">
          <div class="app-card-head app-card-head--simple">
            <div>
              <h3 id="assets-form-title" class="app-card-title">快速注册</h3>
              <p id="assets-form-subtitle" class="app-card-subtitle">录入真实主机参数后立即接入控制面。</p>
            </div>
          </div>
          <div class="app-card-body pt-0">
            <form id="assets-host-form">
              <div>
                <label for="assets-host-id">主机 ID</label>
                <input id="assets-host-id" name="id" placeholder="例如: web-prod-01" type="text">
              </div>
              <div>
                <label for="assets-host-name">显示名称</label>
                <input id="assets-host-name" name="display_name" placeholder="例如: Web 生产节点" type="text">
              </div>
              <div>
                <label for="assets-host-address">连接地址 (IP/域名)</label>
                <input id="assets-host-address" class="font-mono" name="address" placeholder="192.168.x.x" type="text">
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="assets-host-mode">连接模式</label>
                  <select id="assets-host-mode" name="mode">
                    <option value="ssh">SSH</option>
                    <option value="local">本地 (Agent)</option>
                  </select>
                </div>
                <div>
                  <label for="assets-host-port">端口</label>
                  <input id="assets-host-port" class="font-mono" name="port" type="number" value="22">
                </div>
              </div>
              <div>
                <label for="assets-host-user">认证用户</label>
                <input id="assets-host-user" name="user" placeholder="root" type="text">
              </div>
              <div>
                <label for="assets-host-password-env">密码或环境变量名</label>
                <input id="assets-host-password-env" name="password_env" placeholder="例如: OSAGENT_SSH_PASSWORD_111 或明文密码" type="text">
                <p class="app-form-note">推荐填环境变量名；也支持明文密码，但会显示安全警告。</p>
              </div>
              <div class="pt-2 space-y-3">
                <button id="assets-host-submit" class="app-primary-button" type="submit">确认注册</button>
                <button id="assets-host-reset" class="w-full text-[#262624] font-body-sm text-body-sm py-2" type="reset">清空表单</button>
              </div>
            </form>
            <p id="assets-host-message" class="app-form-note">保存后会立刻出现在真实资产列表中。</p>
          </div>
        </aside>
      </div>
    </section>
  </div>
{{- end }}
