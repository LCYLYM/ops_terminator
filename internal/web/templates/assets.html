<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>资产管理 - 运维控制台</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "tertiary-fixed": "#89f4f4",
            "secondary": "#5f5f56",
            "on-surface-variant": "#56423c",
            "surface-bright": "#fcf9f5",
            "error": "#ba1a1a",
            "secondary-fixed": "#e5e3d8",
            "primary-fixed": "#ffdbd0",
            "on-tertiary": "#ffffff",
            "on-tertiary-container": "#f3fffe",
            "surface-tint": "#9d4324",
            "surface-container": "#f0edea",
            "outline": "#89726b",
            "inverse-primary": "#ffb59d",
            "tertiary-container": "#008283",
            "on-secondary-container": "#65655c",
            "on-error-container": "#93000a",
            "background": "#fcf9f5",
            "on-primary-fixed-variant": "#7e2c0e",
            "on-primary-fixed": "#390b00",
            "secondary-container": "#e5e3d8",
            "on-surface": "#1c1c1a",
            "on-background": "#1c1c1a",
            "surface-container-high": "#eae8e4",
            "surface-container-lowest": "#ffffff",
            "primary-container": "#b95837",
            "error-container": "#ffdad6",
            "surface-variant": "#e5e2df",
            "surface-dim": "#dcdad6",
            "on-secondary-fixed": "#1c1c15",
            "tertiary-fixed-dim": "#6cd7d8",
            "on-secondary": "#ffffff",
            "surface": "#fcf9f5",
            "on-error": "#ffffff",
            "tertiary": "#006768",
            "surface-container-highest": "#e5e2df",
            "on-primary": "#ffffff",
            "secondary-fixed-dim": "#c8c7bc",
            "on-tertiary-fixed": "#002020",
            "primary": "#9a4021",
            "on-tertiary-fixed-variant": "#004f50",
            "primary-fixed-dim": "#ffb59d",
            "on-primary-container": "#fffbff",
            "inverse-on-surface": "#f3f0ed",
            "inverse-surface": "#31302e",
            "outline-variant": "#dcc1b8",
            "surface-container-low": "#f6f3f0",
            "on-secondary-fixed-variant": "#47473f"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "sm": "8px",
            "gutter": "24px",
            "2xl": "64px",
            "unit": "4px",
            "container-max": "1120px",
            "md": "16px",
            "xs": "4px",
            "xl": "40px",
            "lg": "24px"
          },
          "fontFamily": {
            "h2": ["Manrope"],
            "h1": ["Manrope"],
            "body-sm": ["Inter"],
            "body-md": ["Inter"],
            "body-lg": ["Inter"],
            "h3": ["Manrope"],
            "label": ["Inter"]
          },
          "fontSize": {
            "h2": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
            "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
            "h3": ["24px", {"lineHeight": "1.4", "fontWeight": "500"}],
            "label": ["13px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500"}]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined[data-weight="fill"] { font-variation-settings: 'FILL' 1; }
  </style>
  <link href="/static/app.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex" data-page="assets">
  <nav class="fixed left-0 top-0 h-full flex flex-col p-4 w-64 border-r border-[#E2E2DB] dark:border-stone-800 bg-[#F5F4ED] dark:bg-stone-950 z-50">
    <div class="flex items-center gap-3 mb-8 px-2">
      <div class="w-8 h-8 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-lg">
        <span class="material-symbols-outlined" data-weight="fill">dns</span>
      </div>
      <div>
        <h1 class="text-lg font-bold text-stone-900 dark:text-stone-100 font-manrope tracking-tight">运维控制台</h1>
        <p class="font-label text-label text-stone-500">静谧的智慧</p>
      </div>
    </div>
    <div class="flex-1 space-y-1">
      <a class="flex items-center gap-3 px-3 py-2 text-[#C96442] dark:text-orange-400 font-semibold bg-[#E6E4D9] dark:bg-stone-800 rounded-lg scale-95 duration-200 transition-colors" href="/assets">
        <span class="material-symbols-outlined">dns</span>
        <span class="font-manrope text-sm tracking-tight">资产管理</span>
      </a>
      <a class="flex items-center gap-3 px-3 py-2 text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-200 hover:bg-[#E6E4D9]/50 dark:hover:bg-stone-800/50 rounded-lg scale-95 duration-200 transition-colors" href="/automation">
        <span class="material-symbols-outlined">bolt</span>
        <span class="font-manrope text-sm tracking-tight">自动化中心</span>
      </a>
      <a class="flex items-center gap-3 px-3 py-2 text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-200 hover:bg-[#E6E4D9]/50 dark:hover:bg-stone-800/50 rounded-lg scale-95 duration-200 transition-colors" href="/settings">
        <span class="material-symbols-outlined">settings</span>
        <span class="font-manrope text-sm tracking-tight">系统设置</span>
      </a>
      <a class="flex items-center gap-3 px-3 py-2 text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-200 hover:bg-[#E6E4D9]/50 dark:hover:bg-stone-800/50 rounded-lg scale-95 duration-200 transition-colors" href="/">
        <span class="material-symbols-outlined">chat</span>
        <span class="font-manrope text-sm tracking-tight">对话历史</span>
      </a>
    </div>
  </nav>

  <main class="flex-1 flex flex-col ml-64 min-h-screen bg-surface">
    <header class="docked full-width top-0 sticky z-40 border-b border-[#E2E2DB] dark:border-stone-800 flex justify-between items-center px-6 py-3 bg-white/80 dark:bg-stone-900/80 backdrop-blur-sm transition-all duration-300">
      <div class="flex items-center bg-surface-container-low rounded-lg px-3 py-1.5 w-64 border border-[#E2E2DB]">
        <span class="material-symbols-outlined text-stone-400 text-sm mr-2">search</span>
        <input class="bg-transparent border-none p-0 focus:ring-0 text-body-sm font-body-sm w-full placeholder-stone-400" placeholder="搜索资产..." type="text"/>
      </div>
      <div class="flex items-center gap-4 text-stone-500 dark:text-stone-400">
        <button class="hover:text-stone-900 dark:hover:text-stone-100 transition-colors"><span class="material-symbols-outlined">notifications</span></button>
        <button class="hover:text-stone-900 dark:hover:text-stone-100 transition-colors"><span class="material-symbols-outlined">help_outline</span></button>
        <button class="hover:text-stone-900 dark:hover:text-stone-100 transition-colors"><span class="material-symbols-outlined">account_circle</span></button>
      </div>
    </header>

    <div class="p-gutter lg:p-xl flex-1 flex flex-col gap-lg max-w-[1200px] mx-auto w-full">
      <div class="flex justify-between items-end">
        <div>
          <h2 class="font-h2 text-h2 text-on-surface">资产列表</h2>
          <p class="font-body-sm text-body-sm text-secondary mt-1">管理和查看所有已注册的主机资源。</p>
        </div>
        <button class="bg-[#C96442] text-white px-4 py-2 rounded-lg font-body-sm text-body-sm hover:bg-[#b05739] transition-colors flex items-center gap-2" id="assets-open-form" type="button">
          <span class="material-symbols-outlined text-sm">add</span>
          新增主机
        </button>
      </div>

      <div class="flex gap-4 items-center">
        <div class="flex gap-2">
          <button class="px-3 py-1.5 rounded-full bg-[#E6E4D9] text-on-surface-variant font-label text-label hover:bg-surface-dim transition-colors" type="button">全部状态</button>
          <button class="px-3 py-1.5 rounded-full bg-white border border-[#E2E2DB] text-on-surface-variant font-label text-label hover:bg-surface-dim transition-colors" type="button">在线</button>
          <button class="px-3 py-1.5 rounded-full bg-white border border-[#E2E2DB] text-on-surface-variant font-label text-label hover:bg-surface-dim transition-colors" type="button">离线</button>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 flex flex-col gap-4" id="assets-host-list"></div>
        <div class="lg:col-span-1">
          <div class="bg-white rounded-[16px] p-6 border border-[#E2E2DB] sticky top-[100px]">
            <h3 class="font-h3 text-h3 text-on-surface mb-2">快速注册</h3>
            <p class="font-body-sm text-body-sm text-secondary mb-6">输入基本信息以接入新主机至控制台。</p>
            <form class="space-y-4" id="assets-host-form">
              <div>
                <label class="block font-label text-label text-on-surface-variant mb-1">主机 ID</label>
                <input class="w-full bg-surface-container-lowest border border-[#E2E2DB] rounded-lg px-3 py-2 font-body-sm text-body-sm outline-none" name="id" placeholder="例如: web-prod-01" type="text"/>
              </div>
              <div>
                <label class="block font-label text-label text-on-surface-variant mb-1">显示名称</label>
                <input class="w-full bg-surface-container-lowest border border-[#E2E2DB] rounded-lg px-3 py-2 font-body-sm text-body-sm outline-none" name="display_name" placeholder="例如: Web 生产节点" type="text"/>
              </div>
              <div>
                <label class="block font-label text-label text-on-surface-variant mb-1">连接地址 (IP/域名)</label>
                <input class="w-full bg-surface-container-lowest border border-[#E2E2DB] rounded-lg px-3 py-2 font-body-sm text-body-sm outline-none font-mono" name="address" placeholder="192.168.x.x" type="text"/>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block font-label text-label text-on-surface-variant mb-1">连接模式</label>
                  <select class="w-full bg-surface-container-lowest border border-[#E2E2DB] rounded-lg px-3 py-2 font-body-sm text-body-sm outline-none" name="mode">
                    <option value="ssh">SSH</option>
                    <option value="local">本地 (Agent)</option>
                  </select>
                </div>
                <div>
                  <label class="block font-label text-label text-on-surface-variant mb-1">端口</label>
                  <input class="w-full bg-surface-container-lowest border border-[#E2E2DB] rounded-lg px-3 py-2 font-body-sm text-body-sm outline-none font-mono" name="port" type="number" value="22"/>
                </div>
              </div>
              <div>
                <label class="block font-label text-label text-on-surface-variant mb-1">认证用户</label>
                <input class="w-full bg-surface-container-lowest border border-[#E2E2DB] rounded-lg px-3 py-2 font-body-sm text-body-sm outline-none placeholder-stone-400" name="user" placeholder="root" type="text"/>
              </div>
              <div>
                <label class="block font-label text-label text-on-surface-variant mb-1">密码环境变量</label>
                <input class="w-full bg-surface-container-lowest border border-[#E2E2DB] rounded-lg px-3 py-2 font-body-sm text-body-sm outline-none placeholder-stone-400" name="password_env" placeholder="OSAGENT_SSH_PASSWORD_HOST" type="text"/>
              </div>
              <div class="pt-4">
                <button class="w-full bg-[#C96442] text-white py-2.5 rounded-lg font-body-sm font-medium hover:bg-[#b05739] transition-colors" type="submit">确认注册</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
